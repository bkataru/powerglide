<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title :text="$page.title"></title>
    <meta name="description" :content="$page.description">
    <link rel="icon" type="image/svg+xml" href="/powerglide/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        'pg-bg': '#050505',
                        'pg-surface': '#0f0f18',
                        'pg-primary': '#F7A41D',
                        'pg-cyan': '#00f0ff',
                        'pg-purple': '#7c3aed',
                        'pg-text': '#e5e5e5',
                        'pg-text-muted': '#888899',
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Inter', sans-serif; }
        code, pre { font-family: 'JetBrains Mono', monospace; }
        .cyber-grid {
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .glow-primary { text-shadow: 0 0 20px rgba(247, 164, 29, 0.6), 0 0 40px rgba(247, 164, 29, 0.3); }
        .glow-cyan { text-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
        .footer-glow { box-shadow: 0 -2px 20px rgba(176, 38, 255, 0.1); }
        .mobile-menu { display: none; }
        .mobile-menu.active { display: block; }
    </style>
</head>
<body class="bg-pg-bg text-pg-text min-h-screen flex flex-col">
    <nav class="p-4 bg-pg-surface border-b border-pg-primary/30 sticky top-0 z-50">
        <div class="container mx-auto flex flex-wrap items-center justify-between max-w-7xl">
            <div class="flex items-center">
                <a href="/powerglide/" class="flex items-center gap-3 transition-transform hover:scale-105">
                    <img src="/powerglide/svg/logo.svg" alt="powerglide" class="w-10 h-10">
                    <span class="text-2xl font-bold text-pg-primary glow-primary">powerglide</span>
                </a>
            </div>
            <button class="md:hidden p-2 text-pg-text hover:text-pg-cyan" onclick="document.getElementById('mobile-menu').classList.toggle('active')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <div id="mobile-menu" class="mobile-menu w-full md:w-auto md:flex md:gap-6 mt-4 md:mt-0">
                <div class="flex flex-col md:flex-row gap-4 md:gap-6">
                    <a href="/powerglide/" class="text-pg-text hover:text-pg-cyan transition-colors py-2 px-3 rounded">Home</a>
                    <a href="/powerglide/features/" class="text-pg-text hover:text-pg-cyan transition-colors py-2 px-3 rounded">Features</a>
                    <a href="/powerglide/architecture/" class="text-pg-text hover:text-pg-cyan transition-colors py-2 px-3 rounded">Architecture</a>
                    <a href="/powerglide/cli-reference/" class="text-pg-text hover:text-pg-cyan transition-colors py-2 px-3 rounded">CLI Reference</a>
                    <a href="/powerglide/configuration/" class="text-pg-text hover:text-pg-cyan transition-colors py-2 px-3 rounded">Configuration</a>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="container mx-auto p-8 cyber-grid flex-grow">
        <article class="py-12">
            <div class="max-w-4xl mx-auto">
                <div class="prose prose-invert prose-lg max-w-none" :html="$page.content()"></div>
            </div>
        </article>
    </main>
    
    <footer class="p-8 bg-pg-surface border-t border-pg-purple/30 mt-12 footer-glow">
        <div class="container mx-auto text-center text-pg-text-muted text-sm">
            <div class="flex flex-wrap justify-center gap-6 mb-4 text-pg-text-muted">
                <a href="/powerglide/" class="hover:text-pg-cyan transition-colors">Home</a>
                <a href="/powerglide/features/" class="hover:text-pg-cyan transition-colors">Features</a>
                <a href="/powerglide/architecture/" class="hover:text-pg-cyan transition-colors">Architecture</a>
                <a href="/powerglide/cli-reference/" class="hover:text-pg-cyan transition-colors">CLI Reference</a>
                <a href="/powerglide/configuration/" class="hover:text-pg-cyan transition-colors">Configuration</a>
                <a href="https://github.com/bkataru/powerglide" class="hover:text-pg-cyan transition-colors">GitHub</a>
            </div>
            <p>Built with <span class="text-pg-primary">❤</span> using <a href="https://zine-ssg.io" class="text-pg-cyan hover:text-pg-cyan">Zine</a> and <a href="https://ziglang.org" class="text-pg-cyan hover:text-pg-cyan">Zig</a></p>
            <p class="mt-2 text-pg-text">&copy; 2026 powerglide — The CLI coding agent that slides ⚡</p>
        </div>
    </footer>
</body>
</html>
