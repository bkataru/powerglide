<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#1a0832"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF9A00"/>
      <stop offset="60%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FFCC44"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: dark rounded square -->
  <rect width="300" height="300" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle circuit grid lines -->
  <g stroke="#ffffff05" stroke-width="1">
    <line x1="75" y1="0" x2="75" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="225" y1="0" x2="225" y2="300"/>
    <line x1="0" y1="75" x2="300" y2="75"/>
    <line x1="0" y1="150" x2="300" y2="150"/>
    <line x1="0" y1="225" x2="300" y2="225"/>
  </g>

  <!-- Outer border subtle glow -->
  <rect width="300" height="300" rx="32" fill="none" stroke="#FF9A0020" stroke-width="2"/>

  <!-- Inner diagonal accent lines (Lamborghini angular style) -->
  <line x1="0" y1="300" x2="150" y2="0" stroke="#FF9A0010" stroke-width="60"/>

  <!-- Speed lines left -->
  <g stroke-linecap="round" opacity="0.7">
    <line x1="22" y1="128" x2="102" y2="128" stroke="#FF9A00" stroke-width="3"/>
    <line x1="15" y1="144" x2="90" y2="144" stroke="#FFB800" stroke-width="2" opacity="0.6"/>
    <line x1="22" y1="160" x2="88" y2="160" stroke="#FFCC44" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Speed lines right -->
  <g stroke-linecap="round" opacity="0.7">
    <line x1="278" y1="128" x2="198" y2="128" stroke="#FF9A00" stroke-width="3"/>
    <line x1="285" y1="144" x2="210" y2="144" stroke="#FFB800" stroke-width="2" opacity="0.6"/>
    <line x1="278" y1="160" x2="212" y2="160" stroke="#FFCC44" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Central lightning bolt — angular, Lamborghini-style -->
  <!-- The bolt: Z-shape, thick at top, tapers, horizontal shelf at mid, continues down -->
  <path d="
    M 168,28
    L 115,148
    L 152,148
    L 132,272
    L 138,272
    L 190,152
    L 150,152
    L 177,28
    Z
  " fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- Small node dots (multi-agent visual metaphor) -->
  <circle cx="55" cy="85" r="3" fill="#FF9A00" opacity="0.5"/>
  <circle cx="245" cy="85" r="3" fill="#FF9A00" opacity="0.5"/>
  <circle cx="55" cy="215" r="3" fill="#FF9A00" opacity="0.3"/>
  <circle cx="245" cy="215" r="3" fill="#FF9A00" opacity="0.3"/>

  <!-- Connecting lines between nodes (multi-agent links) -->
  <line x1="55" y1="85" x2="115" y2="148" stroke="#FF9A0025" stroke-width="1"/>
  <line x1="245" y1="85" x2="190" y2="148" stroke="#FF9A0025" stroke-width="1"/>
  <line x1="55" y1="215" x2="132" y2="152" stroke="#FF9A0015" stroke-width="1"/>
  <line x1="245" y1="215" x2="190" y2="152" stroke="#FF9A0015" stroke-width="1"/>
</svg>
